<!DOCTYPE html>
<html>
<head>
<title>Music Survey</title>
<style>
body{
font-family: Arial, sans-serif;
margin:40px;
background-color:#f4f4f4;
}
h2{
text-align:center;
}
form{
background:white;
padding:20px;
width:60%;
margin:auto;
}
fieldset{
margin-top:15px;
padding:10px;
}
legend{
font-weight:bold;
}
textarea{
width:100%;
}
.buttons{
margin-top:15px;
}
</style>
</head>
<body>
<h2>Music Survey</h2>
<form>
<label>Name:</label><br>
<input type="text" name="name"><br><br>
<label>E-Mail:</label><br>
<input type="email" name="email"><br><br>
<fieldset>
<legend>Select Your Favorite Types of Music:</legend>
<input type="checkbox"> Pop<br>
<input type="checkbox"> Classical<br>
<input type="checkbox"> Other<br>
</fieldset>
<fieldset>
<legend>Select how often you purchase Music:</legend>
<input type="radio" name="purchase"> Weekly<br>
<input type="radio" name="purchase"> A few CDs each year<br>
<input type="radio" name="purchase"> Monthly<br>
<input type="radio" name="purchase"> Never purchase<br>
</fieldset>
<label>Select the locations you listen to Music:</label><br>
<select size="3">
<option>At home</option>
<option>In the car</option>
<option>Anywhere</option>
<option>At the gym</option>
</select><br><br>
<label>What role does music play in your life?</label><br>
<textarea cols="60" rows="3"></textarea><br><br>
<div class="buttons">
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</div>
</form>
<p style="text-align:center;">
Jakaiya Black<br>
Jakaiya820@gmail.com
</p>
</body>
</html>
